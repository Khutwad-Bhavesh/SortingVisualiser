name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Build JAR
        run: |
          javac -d out src/*.java
          jar --create --file SortingVisualizer.jar --main-class=Main -C out .

      - name: Package EXE
        run: |
          jpackage `
            --type exe `
            --name SortingVisualizer `
            --input . `
            --main-jar SortingVisualizer.jar `
            --main-class Main

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SortingVisualizer-Windows
          path: "*.exe"
